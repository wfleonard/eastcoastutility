# /etc/nginx/sites-available/eastcoastutility.com
#
# Reverse-proxies eastcoastutility.com (+ www) → Next.js on localhost:3000.
# `certbot --nginx` will rewrite this file to add the TLS server block on :443
# and a redirect from :80 → :443.
#
# Installed automatically by deploy.sh.

server {
    listen 80;
    listen [::]:80;
    server_name eastcoastutility.com www.eastcoastutility.com;

    # Allow Let's Encrypt HTTP-01 challenge to work even when redirected later.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache static Next.js assets aggressively.
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Larger limit so the contact form's JSON body is never truncated.
    client_max_body_size 1m;
}
